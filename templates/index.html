<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ config.business_name }} News</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

    <!-- Loading overlay -->
    <div class="loading-state" id="loadingOverlay">
        <img src="/static/northwoods-icon.svg" alt="" class="loading-icon">
        <div class="loading-text" id="loadingText">Loading {{ config.business_name }} News...</div>
    </div>

    <!-- Main 3-zone layout -->
    <div class="news-wall" id="newsWall">
        <!-- Featured story zone -->
        <div class="featured-zone" id="featuredZone">
            <!-- Cards injected here by JS -->
        </div>

        <!-- Sidebar zone -->
        <div class="sidebar-zone" id="sidebarZone">
            <!-- 3 compact cards injected here by JS -->
        </div>
    </div>

    <!-- Bottom bar -->
    <div class="bottom-bar" id="bottomBar">
        <div class="bar-item">
            <img src="/static/northwoods-icon.svg" alt="" class="bar-shop-icon">
            <span class="bar-shop-name">{{ config.business_name }}</span>
        </div>
        <div class="bar-divider"></div>
        <div class="bar-item">
            <span class="bar-phone-icon">&#128222;</span>
            <span class="bar-phone">{{ config.phone }}</span>
        </div>
        <div class="bar-divider"></div>
        <div class="bar-item bar-status" id="barStatus">
            <span class="status-dot" id="statusDot"></span>
            <span class="bar-status-text" id="statusLabel">Checking...</span>
        </div>
        <div class="bar-divider"></div>
        <div class="bar-item">
            <span class="bar-hours">{{ config.hours_text }}</span>
        </div>
        <div class="bar-divider" id="countdownDivider" style="display:none;"></div>
        <div class="bar-item">
            <span class="bar-countdown" id="barCountdown"></span>
        </div>
        <div class="bar-divider"></div>
        <div class="bar-item">
            <span class="bar-datetime" id="barDatetime"></span>
        </div>
    </div>

    <!-- Config data for JS -->
    <script id="appConfig" type="application/json">{{ config_json | safe }}</script>
    <script src="/static/app.js"></script>
</body>
</html>
