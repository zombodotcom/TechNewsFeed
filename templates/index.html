<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tech News RSS Slideshow</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
            overflow: hidden;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            padding: 20px;
            padding-bottom: 140px;
        }

        .container {
            width: 100%;
            max-width: 1400px;
            height: calc(100vh - 160px);
            max-height: calc(100vh - 160px);
            position: relative;
        }

        .slide {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            visibility: hidden;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
            border: 1px solid rgba(255, 255, 255, 0.18);
            overflow: hidden;
            transition: opacity 1.5s ease-in-out, visibility 1.5s ease-in-out;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .slide.active {
            opacity: 1;
            visibility: visible;
        }

        .slide-content {
            display: flex;
            gap: 30px;
            flex: 1;
            align-items: flex-start;
            min-height: 0;
            overflow: hidden;
        }

        .slide-text {
            flex: 1;
            min-width: 0;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            overflow: hidden;
        }

        .slide-image-container {
            flex: 1;
            min-width: 0;
            max-width: 45%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .slide-image {
            max-width: 100%;
            max-height: 60vh;
            border-radius: 15px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
            object-fit: contain;
        }

        .slide.no-image .slide-content {
            flex-direction: column;
        }

        .slide.no-image .slide-image-container {
            display: none;
        }


        .slide-header {
            margin-bottom: 20px;
            flex-shrink: 0;
        }

        .source {
            display: inline-block;
            background: rgba(255, 255, 255, 0.2);
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .title {
            font-size: clamp(1.8em, 3.5vw, 2.5em);
            font-weight: 700;
            line-height: 1.3;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
            overflow: hidden;
            text-overflow: ellipsis;
            display: -webkit-box;
            -webkit-line-clamp: 4;
            -webkit-box-orient: vertical;
        }

        .summary {
            font-size: clamp(1em, 1.6vw, 1.2em);
            line-height: 1.6;
            opacity: 0.95;
            overflow: hidden;
            text-overflow: ellipsis;
            display: -webkit-box;
            -webkit-line-clamp: 10;
            -webkit-box-orient: vertical;
        }

        .footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.2);
            flex-shrink: 0;
        }

        .published {
            font-size: 1.1em;
            opacity: 0.8;
        }

        .slide-counter {
            font-size: 1.1em;
            opacity: 0.8;
        }

        .loading {
            text-align: center;
            font-size: 2em;
        }

        .error {
            text-align: center;
            color: #ff6b6b;
            font-size: 1.5em;
            padding: 40px;
        }

        .business-hours {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(10px);
            padding: 25px 40px;
            border-top: 2px solid rgba(255, 255, 255, 0.3);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 40px;
            flex-wrap: wrap;
        }

        .business-name {
            font-size: 2em;
            font-weight: 700;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
            white-space: nowrap;
        }

        .business-phone {
            font-size: 1.6em;
            opacity: 0.95;
            font-weight: 600;
            white-space: nowrap;
        }

        .business-status {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .status-indicator {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        .status-indicator.open {
            background: #4ade80;
            box-shadow: 0 0 15px #4ade80;
        }

        .status-indicator.closed {
            background: #f87171;
            box-shadow: 0 0 15px #f87171;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }

        .status-text {
            font-size: 1.5em;
            font-weight: 600;
            white-space: nowrap;
        }

        .business-hours-text {
            font-size: 1.3em;
            opacity: 0.95;
            white-space: nowrap;
        }

        .countdown {
            font-size: 1.3em;
            opacity: 0.9;
            font-weight: 500;
            white-space: nowrap;
        }

        .countdown-time {
            font-weight: 600;
            color: #fbbf24;
        }


        /* Scrollbar styling */
        .slide::-webkit-scrollbar {
            width: 8px;
        }

        .slide::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
        }

        .slide::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.3);
            border-radius: 10px;
        }

        .slide::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.5);
        }

        /* Responsive design */
        @media (max-width: 768px) {
            body {
                padding: 10px;
            }
            .business-hours {
                top: 10px;
                left: 50%;
                transform: translateX(-50%);
                padding: 12px 20px;
                min-width: 260px;
            }
            .business-name {
                font-size: 1.1em;
            }
            .business-phone {
                font-size: 0.95em;
            }
            .status-text {
                font-size: 0.9em;
            }
            .business-hours-text {
                font-size: 0.8em;
            }
            .countdown {
                font-size: 0.8em;
            }
            .title {
                font-size: 1.8em;
                -webkit-line-clamp: 2;
            }
            .summary {
                font-size: 1em;
                -webkit-line-clamp: 4;
            }
            .container {
                width: 100%;
                height: calc(100vh - 140px);
                max-height: calc(100vh - 140px);
            }
            .slide {
                max-height: calc(100vh - 140px);
            }
            .title {
                font-size: 1.6em;
                -webkit-line-clamp: 3;
            }
            .summary {
                font-size: 0.95em;
                -webkit-line-clamp: 8;
            }
            .business-hours {
                flex-direction: column;
                gap: 15px;
                padding: 20px 25px;
            }
            .business-name {
                font-size: 1.5em;
            }
            .business-phone {
                font-size: 1.2em;
            }
            .status-text {
                font-size: 1.2em;
            }
            .business-hours-text {
                font-size: 1em;
            }
            .countdown {
                font-size: 1em;
            }
            .status-indicator {
                width: 14px;
                height: 14px;
            }
            .slide {
                padding: 20px;
            }
            .slide-content {
                flex-direction: column;
                gap: 20px;
            }
            .slide-image-container {
                max-width: 100%;
            }
            .slide-image {
                max-height: 40vh;
            }
        }
    </style>
</head>
<body>
    <div class="container" id="container">
        <div class="loading" id="loading">Loading tech news...</div>
        <div class="error" id="error" style="display: none;"></div>
    </div>

    <div class="business-hours" id="businessHours">
        <div class="business-name">Northwoods Tech</div>
        <div class="business-phone">715-715-7167</div>
        <div class="business-status">
            <div class="status-indicator" id="statusIndicator"></div>
            <div class="status-text" id="statusText">Checking...</div>
        </div>
        <div class="business-hours-text">Tue-Sat: 10:30 AM - 3:30 PM</div>
        <div class="countdown" id="countdown" style="display: none;"></div>
    </div>


    <script>
        let currentSlide = 0;
        let slides = [];
        const SLIDE_DURATION = 25000; // 25 seconds per slide
        let slideInterval;

        // Fetch feeds from API
        async function fetchFeeds() {
            try {
                document.getElementById('loading').textContent = 'Loading tech news...';
                const response = await fetch('/api/feeds');
                const data = await response.json();
                
                if (data.success && data.items.length > 0) {
                    slides = data.items;
                    document.getElementById('loading').textContent = 'Loading images...';
                    await renderSlides();
                    document.getElementById('loading').style.display = 'none';
                    startSlideshow();
                } else {
                    showError('No news items available. Please try refreshing.');
                }
            } catch (error) {
                console.error('Error fetching feeds:', error);
                showError('Failed to load news. Please check your connection and try again.');
            }
        }

        // Render slides and wait for images to load
        async function renderSlides() {
            const container = document.getElementById('container');
            container.innerHTML = '';
            
            const imagePromises = [];
            
            slides.forEach((item, index) => {
                const slide = document.createElement('div');
                const hasImage = item.image && item.image.trim() !== '';
                
                if (!hasImage) {
                    slide.className = `slide no-image ${index === 0 ? 'active' : ''}`;
                } else {
                    slide.className = `slide ${index === 0 ? 'active' : ''}`;
                }
                
                // Clean HTML from summary
                const summary = cleanHtml(item.summary);
                
                let imageHtml = '';
                if (hasImage) {
                    const img = new Image();
                    const imagePromise = new Promise((resolve, reject) => {
                        img.onload = resolve;
                        img.onerror = () => {
                            slide.classList.add('no-image');
                            resolve(); // Resolve even on error so we don't block
                        };
                        img.src = item.image;
                    });
                    imagePromises.push(imagePromise);
                    
                    imageHtml = `
                        <div class="slide-image-container">
                            <img src="${escapeHtml(item.image)}" alt="${escapeHtml(item.title)}" class="slide-image">
                        </div>
                    `;
                }
                
                slide.innerHTML = `
                    <div class="slide-header">
                        <div class="source">${escapeHtml(item.source)}</div>
                        <h1 class="title">${escapeHtml(item.title)}</h1>
                    </div>
                    <div class="slide-content">
                        <div class="slide-text">
                            <div class="summary">${summary}</div>
                        </div>
                        ${imageHtml}
                    </div>
                    <div class="footer">
                        <div class="published">${formatDate(item.published)}</div>
                        <div class="slide-counter">${index + 1} / ${slides.length}</div>
                    </div>
                `;
                
                container.appendChild(slide);
            });
            
            // Wait for all images to load (or fail) before continuing
            await Promise.all(imagePromises);
        }

        // Clean HTML tags but preserve text
        function cleanHtml(html) {
            const div = document.createElement('div');
            div.innerHTML = html;
            let text = div.textContent || div.innerText || '';
            // Limit length (increased for better readability)
            if (text.length > 800) {
                text = text.substring(0, 800) + '...';
            }
            return escapeHtml(text);
        }

        // Escape HTML to prevent XSS
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Format date
        function formatDate(dateString) {
            if (!dateString) return '';
            try {
                const date = new Date(dateString);
                return date.toLocaleDateString('en-US', { 
                    year: 'numeric', 
                    month: 'long', 
                    day: 'numeric',
                    hour: '2-digit',
                    minute: '2-digit'
                });
            } catch (e) {
                return dateString;
            }
        }

        // Start slideshow
        function startSlideshow() {
            if (slideInterval) {
                clearInterval(slideInterval);
            }
            
            slideInterval = setInterval(() => {
                nextSlide();
            }, SLIDE_DURATION);
        }

        // Show next slide
        function nextSlide() {
            const allSlides = document.querySelectorAll('.slide');
            if (allSlides.length === 0) return;
            
            allSlides[currentSlide].classList.remove('active');
            currentSlide = (currentSlide + 1) % allSlides.length;
            allSlides[currentSlide].classList.add('active');
        }

        // Show previous slide
        function previousSlide() {
            const allSlides = document.querySelectorAll('.slide');
            if (allSlides.length === 0) return;
            
            allSlides[currentSlide].classList.remove('active');
            currentSlide = (currentSlide - 1 + allSlides.length) % allSlides.length;
            allSlides[currentSlide].classList.add('active');
        }

        // Show error message
        function showError(message) {
            document.getElementById('loading').style.display = 'none';
            const errorDiv = document.getElementById('error');
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
        }

        // Keyboard controls
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight' || e.key === ' ') {
                nextSlide();
            } else if (e.key === 'ArrowLeft') {
                previousSlide();
            } else if (e.key === 'r' || e.key === 'R') {
                // Refresh feeds
                fetch('/api/refresh').then(() => fetchFeeds()).catch(console.error);
            }
        });

        // Business hours logic
        function updateBusinessHours() {
            const now = new Date();
            const day = now.getDay(); // 0 = Sunday, 1 = Monday, ..., 6 = Saturday
            const hours = now.getHours();
            const minutes = now.getMinutes();
            const currentTime = hours * 60 + minutes; // Convert to minutes since midnight
            
            const openTime = 10 * 60 + 30; // 10:30 AM = 630 minutes
            const closeTime = 15 * 60 + 30; // 3:30 PM = 930 minutes
            
            const statusIndicator = document.getElementById('statusIndicator');
            const statusText = document.getElementById('statusText');
            const countdown = document.getElementById('countdown');
            
            // Check if it's Tuesday (2) through Saturday (6)
            const isOpenDay = day >= 2 && day <= 6;
            const isOpenTime = isOpenDay && currentTime >= openTime && currentTime < closeTime;
            
            if (isOpenTime) {
                // Open
                statusIndicator.className = 'status-indicator open';
                statusText.textContent = 'Open Now';
                countdown.style.display = 'none';
            } else {
                // Closed
                statusIndicator.className = 'status-indicator closed';
                statusText.textContent = 'Closed';
                countdown.style.display = 'block';
                
                // Calculate next opening time
                let nextOpen = new Date(now);
                
                if (!isOpenDay) {
                    // Not an open day (Sunday or Monday)
                    if (day === 0) { // Sunday
                        nextOpen.setDate(now.getDate() + 2); // Tuesday
                    } else { // Monday
                        nextOpen.setDate(now.getDate() + 1); // Tuesday
                    }
                    nextOpen.setHours(10, 30, 0, 0);
                } else {
                    // It's an open day
                    if (currentTime < openTime) {
                        // Before opening time today
                        nextOpen.setHours(10, 30, 0, 0);
                    } else {
                        // After closing time today
                        if (day === 6) { // Saturday
                            nextOpen.setDate(now.getDate() + 2); // Tuesday
                        } else {
                            nextOpen.setDate(now.getDate() + 1); // Next day
                        }
                        nextOpen.setHours(10, 30, 0, 0);
                    }
                }
                
                // Calculate time difference
                const diff = nextOpen - now;
                const days = Math.floor(diff / (1000 * 60 * 60 * 24));
                const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                const mins = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
                
                let countdownText = 'Returning in ';
                if (days > 0) {
                    countdownText += `${days}d ${hours}h ${mins}m`;
                } else if (hours > 0) {
                    countdownText += `${hours}h ${mins}m`;
                } else {
                    countdownText += `${mins}m`;
                }
                
                countdown.innerHTML = `<span class="countdown-time">${countdownText}</span>`;
            }
        }

        // Update business hours every minute
        updateBusinessHours();
        setInterval(updateBusinessHours, 60000); // Update every minute

        // Auto-refresh feeds every 30 minutes
        setInterval(fetchFeeds, 30 * 60 * 1000);

        // Initial load
        fetchFeeds();
    </script>
</body>
</html>
