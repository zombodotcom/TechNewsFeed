<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 480" fill="none">
  <!-- Phone frame -->
  <rect width="280" height="480" rx="28" fill="#1c1c1e"/>
  <rect x="8" y="8" width="264" height="464" rx="22" fill="#000"/>
  <!-- Status bar -->
  <text x="24" y="34" font-family="Arial,sans-serif" font-size="12" fill="#999">10:23 AM</text>
  <text x="230" y="34" font-family="Arial,sans-serif" font-size="12" fill="#999">LTE</text>
  <!-- Messages header -->
  <rect x="8" y="44" width="264" height="40" fill="#1c1c1e"/>
  <text x="140" y="70" text-anchor="middle" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="white">22395</text>
  <!-- Alert message bubble -->
  <rect x="20" y="110" width="225" height="160" rx="16" fill="#2c2c2e"/>
  <text x="36" y="138" font-family="Arial,sans-serif" font-size="12" fill="#ff6b6b" font-weight="bold">[ALERT]</text>
  <text x="90" y="138" font-family="Arial,sans-serif" font-size="12" fill="#e5e5e7">Chase Bank:</text>
  <text x="36" y="160" font-family="Arial,sans-serif" font-size="12" fill="#e5e5e7">Unusual sign-in detected on</text>
  <text x="36" y="178" font-family="Arial,sans-serif" font-size="12" fill="#e5e5e7">your account from an</text>
  <text x="36" y="196" font-family="Arial,sans-serif" font-size="12" fill="#e5e5e7">unrecognized device. If this</text>
  <text x="36" y="214" font-family="Arial,sans-serif" font-size="12" fill="#e5e5e7">wasn't you, secure your</text>
  <text x="36" y="232" font-family="Arial,sans-serif" font-size="12" fill="#e5e5e7">account immediately:</text>
  <text x="36" y="256" font-family="Arial,sans-serif" font-size="12" fill="#0a84ff">chase-secure-verify.com/login</text>
  <!-- Timestamp -->
  <text x="140" y="295" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#636366">Today 10:22 AM</text>
  <!-- Second message -->
  <rect x="20" y="315" width="225" height="120" rx="16" fill="#2c2c2e"/>
  <text x="36" y="343" font-family="Arial,sans-serif" font-size="12" fill="#e5e5e7">Wells Fargo: A $487.23</text>
  <text x="36" y="361" font-family="Arial,sans-serif" font-size="12" fill="#e5e5e7">transaction was flagged on</text>
  <text x="36" y="379" font-family="Arial,sans-serif" font-size="12" fill="#e5e5e7">your debit card. If you did not</text>
  <text x="36" y="397" font-family="Arial,sans-serif" font-size="12" fill="#e5e5e7">authorize this, verify now:</text>
  <text x="36" y="421" font-family="Arial,sans-serif" font-size="12" fill="#0a84ff">wf-alerts-verify.net/secure</text>
</svg>
