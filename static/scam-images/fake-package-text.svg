<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 480" fill="none">
  <!-- Phone frame -->
  <rect width="280" height="480" rx="28" fill="#1c1c1e"/>
  <rect x="8" y="8" width="264" height="464" rx="22" fill="#000"/>
  <!-- Status bar -->
  <text x="24" y="34" font-family="Arial,sans-serif" font-size="12" fill="#999">9:41 AM</text>
  <text x="230" y="34" font-family="Arial,sans-serif" font-size="12" fill="#999">5G</text>
  <!-- Messages header -->
  <rect x="8" y="44" width="264" height="40" fill="#1c1c1e"/>
  <text x="140" y="70" text-anchor="middle" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="white">+1 (833) 555-0192</text>
  <!-- Message bubble -->
  <rect x="20" y="110" width="220" height="140" rx="16" fill="#2c2c2e"/>
  <text x="36" y="138" font-family="Arial,sans-serif" font-size="12" fill="#e5e5e7">USPS: Your package has a</text>
  <text x="36" y="156" font-family="Arial,sans-serif" font-size="12" fill="#e5e5e7">delivery issue. Update your</text>
  <text x="36" y="174" font-family="Arial,sans-serif" font-size="12" fill="#e5e5e7">address to avoid return to</text>
  <text x="36" y="192" font-family="Arial,sans-serif" font-size="12" fill="#e5e5e7">sender:</text>
  <!-- Fake link -->
  <text x="36" y="218" font-family="Arial,sans-serif" font-size="12" fill="#0a84ff" text-decoration="underline">usps-redelivery-update.xyz</text>
  <text x="36" y="240" font-family="Arial,sans-serif" font-size="11" fill="#8e8e93">Reply STOP to unsubscribe</text>
  <!-- Timestamp -->
  <text x="140" y="275" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#636366">Today 2:34 PM</text>
  <!-- Second scam message -->
  <rect x="20" y="295" width="220" height="100" rx="16" fill="#2c2c2e"/>
  <text x="36" y="323" font-family="Arial,sans-serif" font-size="12" fill="#e5e5e7">FedEx: We attempted delivery</text>
  <text x="36" y="341" font-family="Arial,sans-serif" font-size="12" fill="#e5e5e7">but no one was available.</text>
  <text x="36" y="359" font-family="Arial,sans-serif" font-size="12" fill="#e5e5e7">Reschedule now:</text>
  <text x="36" y="382" font-family="Arial,sans-serif" font-size="12" fill="#0a84ff">fedex-schedule.info/track</text>
</svg>
