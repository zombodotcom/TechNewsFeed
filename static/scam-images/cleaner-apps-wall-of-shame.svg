<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 460" fill="none">
  <!-- Background -->
  <rect width="600" height="460" rx="16" fill="#1a1a2e"/>

  <!-- Header strip -->
  <rect x="0" y="0" width="600" height="64" fill="#cc0000"/>
  <polygon points="32,16 52,48 12,48" fill="#ffcc00" stroke="#1a1a2e" stroke-width="2"/>
  <text x="42" y="42" text-anchor="middle" font-family="Arial,sans-serif" font-size="20" font-weight="bold" fill="#cc0000">!</text>
  <text x="80" y="40" font-family="Arial,sans-serif" font-size="22" font-weight="bold" fill="white">DELETE THESE FROM YOUR PHONE</text>

  <!-- Reusable red X -->
  <defs>
    <g id="redX">
      <line x1="-46" y1="-46" x2="46" y2="46" stroke="#ff2222" stroke-width="11" stroke-linecap="round"/>
      <line x1="46" y1="-46" x2="-46" y2="46" stroke="#ff2222" stroke-width="11" stroke-linecap="round"/>
    </g>
  </defs>

  <!-- Row 1: iOS apps -->
  <text x="80" y="90" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="#ffcc88">iPhone (App Store)</text>

  <g transform="translate(100,160)">
    <image href="/static/scam-images/icons/cleaner-guru.jpg" x="-50" y="-50" width="100" height="100" preserveAspectRatio="xMidYMid slice"/>
    <rect x="-50" y="-50" width="100" height="100" rx="22" fill="none" stroke="#ff2222" stroke-width="3"/>
    <use href="#redX"/>
    <text x="0" y="78" text-anchor="middle" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="white">Cleaner Guru</text>
  </g>

  <g transform="translate(250,160)">
    <image href="/static/scam-images/icons/cleanup.jpg" x="-50" y="-50" width="100" height="100" preserveAspectRatio="xMidYMid slice"/>
    <rect x="-50" y="-50" width="100" height="100" rx="22" fill="none" stroke="#ff2222" stroke-width="3"/>
    <use href="#redX"/>
    <text x="0" y="78" text-anchor="middle" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="white">Cleanup</text>
  </g>

  <g transform="translate(400,160)">
    <image href="/static/scam-images/icons/cleaner-kit.jpg" x="-50" y="-50" width="100" height="100" preserveAspectRatio="xMidYMid slice"/>
    <rect x="-50" y="-50" width="100" height="100" rx="22" fill="none" stroke="#ff2222" stroke-width="3"/>
    <use href="#redX"/>
    <text x="0" y="78" text-anchor="middle" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="white">Cleaner Kit</text>
  </g>

  <g transform="translate(550,160)">
    <image href="/static/scam-images/icons/ai-cleaner.jpg" x="-50" y="-50" width="100" height="100" preserveAspectRatio="xMidYMid slice"/>
    <rect x="-50" y="-50" width="100" height="100" rx="22" fill="none" stroke="#ff2222" stroke-width="3"/>
    <use href="#redX"/>
    <text x="0" y="78" text-anchor="middle" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="white">AI Cleaner</text>
  </g>

  <!-- Row 2: Android apps -->
  <text x="80" y="290" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="#ffcc88">Android (Play Store)</text>

  <g transform="translate(175,360)">
    <image href="/static/scam-images/icons/ace-cleaner.jpg" x="-50" y="-50" width="100" height="100" preserveAspectRatio="xMidYMid slice"/>
    <rect x="-50" y="-50" width="100" height="100" rx="22" fill="none" stroke="#ff2222" stroke-width="3"/>
    <use href="#redX"/>
    <text x="0" y="78" text-anchor="middle" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="white">Ace Cleaner</text>
  </g>

  <g transform="translate(425,360)">
    <image href="/static/scam-images/icons/ai-phone-cleaner.jpg" x="-50" y="-50" width="100" height="100" preserveAspectRatio="xMidYMid slice"/>
    <rect x="-50" y="-50" width="100" height="100" rx="22" fill="none" stroke="#ff2222" stroke-width="3"/>
    <use href="#redX"/>
    <text x="0" y="78" text-anchor="middle" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="white">AI Phone Cleaner</text>
  </g>

  <!-- Footer -->
  <text x="300" y="450" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" fill="#ffcc88" font-style="italic">+ any other "cleaner / booster / speed-up" app. We'll remove them free.</text>
</svg>
