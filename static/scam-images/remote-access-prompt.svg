<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 360" fill="none">
  <!-- Desktop background -->
  <rect width="480" height="360" rx="12" fill="#0a1628"/>
  <!-- Dialog window -->
  <rect x="60" y="30" width="360" height="300" rx="8" fill="#2b2b3d"/>
  <!-- Title bar -->
  <rect x="60" y="30" width="360" height="32" rx="8" fill="#3d3d55"/>
  <rect x="60" y="46" width="360" height="16" fill="#3d3d55"/>
  <circle cx="398" cy="46" r="8" fill="#ff5f57"/>
  <!-- AnyDesk-style icon -->
  <g transform="translate(170, 76)">
    <rect width="140" height="40" rx="6" fill="#ef443b"/>
    <text x="70" y="27" text-anchor="middle" font-family="Arial,sans-serif" font-size="18" font-weight="bold" fill="white">AnyDesk</text>
  </g>
  <!-- Connection request -->
  <text x="240" y="148" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" fill="#ccc">Incoming connection request</text>
  <!-- "Technician" info -->
  <rect x="110" y="164" width="260" height="50" rx="6" fill="#1e1e30"/>
  <text x="140" y="186" font-family="Arial,sans-serif" font-size="12" fill="#aaa">From:</text>
  <text x="180" y="186" font-family="Arial,sans-serif" font-size="12" fill="white" font-weight="bold">Microsoft Support Tech</text>
  <text x="140" y="204" font-family="Arial,sans-serif" font-size="11" fill="#888">ID: 547 832 091</text>
  <!-- Permission text -->
  <text x="240" y="240" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="#aaa">This person wants to view and control</text>
  <text x="240" y="256" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="#aaa">your desktop. Allow access?</text>
  <!-- Buttons -->
  <rect x="110" y="275" width="120" height="36" rx="6" fill="#ef443b"/>
  <text x="170" y="298" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="white">Accept</text>
  <rect x="250" y="275" width="120" height="36" rx="6" fill="#444"/>
  <text x="310" y="298" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" fill="#ccc">Dismiss</text>
</svg>
