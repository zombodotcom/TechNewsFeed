<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 360" fill="none">
  <!-- Blue screen background -->
  <rect width="480" height="360" rx="12" fill="#0078d4"/>
  <!-- Fake Microsoft logo -->
  <g transform="translate(180,30)">
    <rect x="0" y="0" width="24" height="24" fill="#f25022"/>
    <rect x="28" y="0" width="24" height="24" fill="#7fba00"/>
    <rect x="0" y="28" width="24" height="24" fill="#00a4ef"/>
    <rect x="28" y="28" width="24" height="24" fill="#ffb900"/>
  </g>
  <text x="260" y="52" text-anchor="start" font-family="Arial,sans-serif" font-size="18" fill="white" font-weight="bold">Microsoft</text>
  <!-- Lock icon -->
  <g transform="translate(215, 80)">
    <rect x="10" y="20" width="30" height="25" rx="3" fill="white"/>
    <path d="M15,20 V14 A10,10 0 0,1 35,14 V20" stroke="white" stroke-width="4" fill="none"/>
    <circle cx="25" cy="30" r="3" fill="#0078d4"/>
  </g>
  <!-- Warning text -->
  <text x="240" y="140" text-anchor="middle" font-family="Arial,sans-serif" font-size="16" font-weight="bold" fill="white">Windows Defender - Security Warning</text>
  <text x="240" y="170" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" fill="#cce4ff">** YOUR COMPUTER HAS BEEN BLOCKED **</text>
  <text x="240" y="195" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="#cce4ff">This computer is locked due to suspicious activity.</text>
  <text x="240" y="215" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="#cce4ff">Trojan Spyware detected. Your passwords and financial</text>
  <text x="240" y="232" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="#cce4ff">information are not safe. Do not ignore this warning.</text>
  <!-- Fake support number -->
  <rect x="130" y="252" width="220" height="36" rx="4" fill="white"/>
  <text x="240" y="275" text-anchor="middle" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#0078d4">Call Support: 1-855-555-0147</text>
  <text x="240" y="315" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#99ccff">Error Code: DW6VB36</text>
  <text x="240" y="335" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#99ccff">Do not restart your computer. Closing this may cause data loss.</text>
</svg>
