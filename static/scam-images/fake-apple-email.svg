<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 360" fill="none">
  <!-- Email client background -->
  <rect width="480" height="360" rx="12" fill="#f5f5f7"/>
  <!-- Email header -->
  <rect x="20" y="16" width="440" height="60" fill="white" rx="6"/>
  <text x="36" y="38" font-family="Arial,sans-serif" font-size="10" fill="#888">From:</text>
  <text x="72" y="38" font-family="Arial,sans-serif" font-size="10" fill="#333" font-weight="bold">Apple</text>
  <text x="104" y="38" font-family="Arial,sans-serif" font-size="10" fill="#888">&lt;noreply@apple-id-receipt.xyz&gt;</text>
  <text x="36" y="56" font-family="Arial,sans-serif" font-size="10" fill="#888">Subject:</text>
  <text x="80" y="56" font-family="Arial,sans-serif" font-size="10" fill="#333" font-weight="bold">Your Apple ID receipt - Order #MX8847291</text>
  <text x="36" y="70" font-family="Arial,sans-serif" font-size="9" fill="#aaa">To: you</text>
  <!-- Email body -->
  <rect x="20" y="84" width="440" height="256" fill="white" rx="6"/>
  <!-- Apple-style logo placeholder -->
  <g transform="translate(220, 100)">
    <circle cx="20" cy="10" r="16" fill="#333"/>
    <text x="20" y="16" text-anchor="middle" font-family="Arial,sans-serif" font-size="18" fill="white">&#63743;</text>
  </g>
  <text x="240" y="142" text-anchor="middle" font-family="Arial,sans-serif" font-size="15" fill="#333" font-weight="bold">Apple ID Receipt</text>
  <!-- Fake purchase details -->
  <line x1="60" y1="155" x2="420" y2="155" stroke="#e0e0e0" stroke-width="1"/>
  <text x="70" y="175" font-family="Arial,sans-serif" font-size="11" fill="#555">Item:</text>
  <text x="160" y="175" font-family="Arial,sans-serif" font-size="11" fill="#333">iCloud Storage Upgrade (2TB)</text>
  <text x="70" y="195" font-family="Arial,sans-serif" font-size="11" fill="#555">Amount:</text>
  <text x="160" y="195" font-family="Arial,sans-serif" font-size="11" fill="#333" font-weight="bold">$149.99</text>
  <text x="70" y="215" font-family="Arial,sans-serif" font-size="11" fill="#555">Billed to:</text>
  <text x="160" y="215" font-family="Arial,sans-serif" font-size="11" fill="#333">Visa ending in **4829</text>
  <text x="70" y="235" font-family="Arial,sans-serif" font-size="11" fill="#555">Order Date:</text>
  <text x="160" y="235" font-family="Arial,sans-serif" font-size="11" fill="#333">March 3, 2026</text>
  <line x1="60" y1="248" x2="420" y2="248" stroke="#e0e0e0" stroke-width="1"/>
  <!-- Phishing CTA -->
  <text x="240" y="270" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="#555">Didn't authorize this purchase?</text>
  <rect x="150" y="280" width="180" height="34" rx="6" fill="#0071e3"/>
  <text x="240" y="302" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="white">Cancel &amp; Get Refund</text>
  <text x="240" y="328" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#aaa">This email was sent to confirm your purchase. Apple ID: your-email@icloud.com</text>
</svg>
